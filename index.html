<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--secondary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-top: 0;
            color: var(--secondary-color);
        }

        .calculator-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .calculator-layout {
                grid-template-columns: 350px 1fr;
            }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: #e8f4fd;
            border-left: 5px solid var(--primary-color);
            border-radius: 4px;
        }

        .result-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #555;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1b4f72;
        }

        .chart-container {
            position: relative;
            min-height: 300px;
            width: 100%;
        }

        .error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Definite Integration Calculator</h1>
    
    <div class="calculator-layout">
        <div class="controls">
            <div class="input-group">
                <label for="function-input">Function f(x)</label>
                <input type="text" id="function-input" value="x^2 - 2x" placeholder="e.g., x^2, sin(x), exp(x)">
                <div id="error-msg" class="error">Invalid expression</div>
            </div>

            <div class="input-group">
                <label for="lower-bound">Lower Bound (a)</label>
                <input type="number" id="lower-bound" value="0" step="any">
            </div>

            <div class="input-group">
                <label for="upper-bound">Upper Bound (b)</label>
                <input type="number" id="upper-bound" value="3" step="any">
            </div>

            <div class="result-box">
                <div class="result-title">Definite Integral Value</div>
                <div id="result" class="result-value">0</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<script>
    // Global chart instance variable
    let chartInstance = null;

    // Grab DOM elements
    const fxInput = document.getElementById('function-input');
    const aInput = document.getElementById('lower-bound');
    const bInput = document.getElementById('upper-bound');
    const resultDiv = document.getElementById('result');
    const errorDiv = document.getElementById('error-msg');

    // Attach event listeners for real-time updates
    fxInput.addEventListener('input', calculateAndPlot);
    aInput.addEventListener('input', calculateAndPlot);
    bInput.addEventListener('input', calculateAndPlot);

    // Initial run
    calculateAndPlot();

    function calculateAndPlot() {
        errorDiv.style.display = 'none';
        
        const exprString = fxInput.value;
        const a = parseFloat(aInput.value);
        const b = parseFloat(bInput.value);

        if (isNaN(a) || isNaN(b)) return;

        try {
            // Compile mathematical expression using math.js
            const compiledExpr = math.compile(exprString);
            
            // Helper function to evaluate f(x)
            const f = (x) => compiledExpr.evaluate({ x: x });

            // 1. Calculate the Integral using Simpson's Rule
            const integralValue = simpsonsRule(f, a, b, 200);
            resultDiv.innerText = isNaN(integralValue) ? "Error" : integralValue.toFixed(5);

            // 2. Generate plotting data
            // We want to scale the view dynamically around [a, b]
            const margin = Math.abs(b - a) * 0.5 || 2; 
            const xMin = Math.min(a, b) - margin;
            const xMax = Math.max(a, b) + margin;
            
            const steps = 300;
            const dx = (xMax - xMin) / steps;

            const mainLineData = [];
            const shadedAreaData = [];

            for (let i = 0; i <= steps; i++) {
                const x = xMin + i * dx;
                let y;
                try {
                    y = f(x);
                } catch(e) {
                    y = null;
                }

                if (typeof y === 'number' && !isNaN(y) && isFinite(y)) {
                    mainLineData.push({ x: x, y: y });
                    
                    // If 'x' is within bounds [a, b], add it to shaded area
                    if (x >= Math.min(a, b) && x <= Math.max(a, b)) {
                        shadedAreaData.push({ x: x, y: y });
                    }
                }
            }

            updateChart(mainLineData, shadedAreaData, a, b);

        } catch (error) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = "Error parsing function";
            resultDiv.innerText = "—";
        }
    }

    // Numerical Integration: Simpson's Rule Implementation
    function simpsonsRule(f, a, b, n) {
        if (a === b) return 0;
        // Ensure n is even
        if (n % 2 !== 0) n++;
        
        const h = (b - a) / n;
        let sum = f(a) + f(b);

        for (let i = 1; i < n; i++) {
            const x = a + i * h;
            sum += (i % 2 === 0) ? 2 * f(x) : 4 * f(x);
        }
        
        return (h / 3) * sum;
    }

    // Chart.js rendering function
    function updateChart(lineData, areaData, a, b) {
        const ctx = document.getElementById('myChart').getContext('2d');

        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    {
                        label: 'f(x)',
                        data: lineData,
                        borderColor: '#2c3e50',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        order: 1
                    },
                    {
                        label: `Area from ${a} to ${b}`,
                        data: areaData,
                        backgroundColor: 'rgba(52, 152, 219, 0.35)',
                        borderColor: 'transparent',
                        pointRadius: 0,
                        fill: 'origin', // fills down/up to the x-axis (y=0)
                        order: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear',
                        position: 'bottom',
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        },
                        title: {
                            display: true,
                            text: 'x'
                        }
                    },
                    y: {
                        type: 'linear',
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        },
                        title: {
                            display: true,
                            text: 'y'
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: true,
                        labels: {
                            // Only show legends that actually have elements
                            filter: function(item) {
                                return item.text !== undefined;
                            }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `(${context.parsed.x.toFixed(2)}, ${context.parsed.y.toFixed(2)})`;
                            }
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
